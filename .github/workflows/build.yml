name: Build Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Clone Original Author Repository
        run: |
          # Скачиваем чистый оригинальный код автора в папку project
          git clone https://github.com project

      - name: Copy Blocklist to Project
        run: |
          # Проверяем, загрузили ли вы blocklist.bin в корень или в папку data
          if [ -f "blocklist.bin" ]; then
            cp blocklist.bin project/data/blocklist.bin
            echo "Файл скопирован из корня"
          elif [ -f "data/blocklist.bin" ]; then
            cp data/blocklist.bin project/data/blocklist.bin
            echo "Файл скопирован из папки data"
          else
            echo "Внимание: Файл blocklist.bin не найден в вашем репозитории. Будет сгенерирован дефолтный список."
            cd project/tools && pip install requests && python build_blocklist.py
          fi

      - name: ESP-IDF Build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1
          target: esp32c3
          path: 'project'

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32c3-adblock-firmware
          path: |
            project/build/bootloader/bootloader.bin
            project/build/partition_table/partition-table.bin
            project/build/esp32-c3-adblock.bin
