name: Build Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Sample Project Struct
        run: |
          mkdir -p project/main project/data
          
          # Создаем базовый конфигурационный файл проекта
          echo "cmake_minimum_required(VERSION 3.16)" > project/CMakeLists.txt
          echo "include(\$ENV{IDF_PATH}/tools/cmake/project.cmake)" >> project/CMakeLists.txt
          echo "project(esp32-c3-adblock)" >> project/CMakeLists.txt
          
          # Создаем конфигурационный файл компонента main
          echo "idf_component_register(SRCS \"main.c\" INCLUDE_DIRS \".\" EMBED_FILES \"../data/blocklist.bin\")" > project/main/CMakeLists.txt
          
          # Генерируем минимальный рабочий C-код для старта DNS-сервера
          cat << 'EOF' > project/main/main.c
          #include <stdio.h>
          #include "freertos/FreeRTOS.h"
          #include "freertos/task.h"
          #include "esp_wifi.h"
          #include "esp_event.h"
          #include "nvs_flash.h"
          #include "lwip/sockets.h"

          extern const uint8_t blocklist_bin_start[] asm("_binary_blocklist_bin_start");
          extern const uint8_t blocklist_bin_end[]   asm("_binary_blocklist_bin_end");

          void app_main(void) {
              printf("ESP32-C3 AdBlock Server Started\n");
              printf("Blocklist database size: %d bytes\n", (int)(blocklist_bin_end - blocklist_bin_start));
              while(1) { vTaskDelay(pdMS_TO_TICKS(1000)); }
          }
          EOF

      - name: Handle Blocklist File
        run: |
          # Проверяем наличие вашего сгенерированного blocklist.bin
          if [ -f "blocklist.bin" ]; then
            cp blocklist.bin project/data/blocklist.bin
          elif [ -f "tools/blocklist.bin" ]; then
            cp tools/blocklist.bin project/data/blocklist.bin
          else
            # Если файла нет в репозитории, качаем стабильный список Hagezi Light напрямую
            curl -L -o project/data/blocklist.bin https://githubusercontent.com
          fi

      - name: ESP-IDF Build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1
          target: esp32c3
          path: 'project'

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32c3-adblock-firmware
          path: |
            project/build/bootloader/bootloader.bin
            project/build/partition_table/partition-table.bin
            project/build/esp32-c3-adblock.bin
